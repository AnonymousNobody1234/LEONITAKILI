<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autopilot — autonomous company builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI',
          Roboto, sans-serif;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body class="bg-neutral-950 text-neutral-200 min-h-screen">
    <!-- Live terminal strip (the polsia.com/live feel) -->
    <div
      id="terminal"
      class="mono text-xs bg-black text-emerald-400 px-4 py-2 h-24 overflow-y-auto border-b border-neutral-800 whitespace-pre-wrap leading-relaxed"
    >
      &gt; Autopilot booting...
    </div>

    <div class="mx-auto max-w-6xl px-4 py-6">
      <!-- Header -->
      <header class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-white">Autopilot</h1>
          <p class="text-sm text-neutral-500">
            Describe a company. It researches, writes the strategy, builds a
            live landing page, and drafts your launch — on its own.
          </p>
        </div>
        <div class="flex items-center gap-3">
          <span id="spend-badge" class="text-xs text-neutral-500"></span>
          <span
            id="provider-badge"
            class="text-xs px-3 py-1.5 rounded-full bg-neutral-800 text-neutral-400"
            >…</span
          >
        </div>
      </header>

      <!-- Launch form -->
      <form
        id="company-form"
        class="rounded-xl border border-neutral-800 bg-neutral-900 p-4 mb-6 grid gap-3 sm:grid-cols-[1fr_1fr_auto]"
      >
        <input
          name="name"
          placeholder="Company name (e.g. AgentRun)"
          required
          class="rounded-lg bg-neutral-800 border border-neutral-700 px-3 py-2 text-sm focus:outline-none focus:border-emerald-500"
        />
        <input
          name="audience"
          placeholder="Audience (optional, e.g. indie founders)"
          class="rounded-lg bg-neutral-800 border border-neutral-700 px-3 py-2 text-sm focus:outline-none focus:border-emerald-500"
        />
        <button
          type="submit"
          class="rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium px-5 py-2 transition-colors whitespace-nowrap"
        >
          Launch company
        </button>
        <textarea
          name="description"
          placeholder="What does it do? (e.g. A tool that turns a tweet into a full blog post)"
          required
          rows="2"
          class="sm:col-span-3 rounded-lg bg-neutral-800 border border-neutral-700 px-3 py-2 text-sm focus:outline-none focus:border-emerald-500"
        ></textarea>
      </form>

      <!-- Company tabs -->
      <div id="company-tabs" class="flex flex-wrap gap-2 mb-4"></div>

      <!-- Active company dashboard -->
      <div id="company-view" class="grid gap-5 lg:grid-cols-3">
        <p class="text-sm text-neutral-600 lg:col-span-3">
          No company yet — launch one above and watch it build itself.
        </p>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
